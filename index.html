<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Stock Trader (1000 ETB)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🤖 AI Stock Trader</h1>
        <div class="balance">
            <p>Cash: <span id="cash">1000.00</span> ETB</p>
            <p>Portfolio Value: <span id="portfolioValue">0.00</span> ETB</p>
            <p>Total Equity: <span id="totalEquity">1000.00</span> ETB</p>
        </div>

        <div class="market">
            <h2>Market (SIMULATED)</h2>
            <p>Current Price: <span id="price">0.00</span> ETB</p>
            <p>20‑SMA: <span id="sma">0.00</span> ETB</p>
            <p>Signal: <span id="signal">WAITING</span></p>
        </div>

        <div class="holdings">
            <h2>Holdings</h2>
            <table id="holdingsTable">
                <thead>
                    <tr><th>Stock</th><th>Qty</th><th>Buy Price</th><th>Current Value</th><th>Profit %</th></tr>
                </thead>
                <tbody id="holdingsBody"></tbody>
            </table>
        </div>

        <div class="log">
            <h2>Transaction Log</h2>
            <div id="logContainer"></div>
        </div>

        <div class="controls">
            <button id="startBtn">▶ Start Bot</button>
            <button id="stopBtn">⏸ Stop Bot</button>
            <button id="resetBtn">⟲ Reset to 1000 ETB</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
